baseURL = "https://bltsec.com/"
languageCode = "en-us"
theme = "terminal"
pagination.pagerSize = 5

[markup.goldmark.renderer]
  unsafe = true

[params]
  contentTypeName = "posts"
  showMenuItems = 2
  fullWidthTheme = false
  centerTheme = true
  readMore = "Read more"
  subtitle = "Offensive Security Research & Operations"

  [params.twitter]
    creator = "BLTSEC"
    site = "BLTSEC"

[languages]
  [languages.en]
    title = "BLTSEC"
    subtitle = "Offensive Security Research & Operations"
    keywords = ""
    copyright = "© 2026 BLTSEC"
    menuMore = "Show more"
    readMore = "Read more"
    readOtherPosts = "Read other posts"

    [languages.en.params.logo]
      logoText = "BLTSEC"
      logoHomeLink = "/"

    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "about"
        name = "About"
        url = "/about"
      [[languages.en.menu.main]]
        identifier = "posts"
        name = "Posts"
        url = "/posts"

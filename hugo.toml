baseURL = "https://bltsec.com/"
languageCode = "en-us"
theme = "terminal"
pagination.pagerSize = 5

[markup.goldmark.renderer]
  unsafe = true

[params]
  contentTypeName = "posts"
  fullWidthTheme = false
  centerTheme = true
  readMore = "Read more"
  subtitle = "Offensive Security Research & Operations"
  description = "Offensive security research, red team techniques, custom tooling, and vulnerability writeups."
  keywords = "offensive security, red team, penetration testing, security research, custom tooling"
  missingContentMessage = "Nothing here. Move along."
  missingBackButtonLabel = "Back to BLTSEC"
  showMenuItems = 3

  [params.twitter]
    creator = "BLTSEC"
    site = "BLTSEC"

[languages]
  [languages.en]
    title = "BLTSEC"
    subtitle = "Offensive Security Research & Operations"
    keywords = "offensive security, red team, penetration testing, security research, custom tooling"
    copyright = "© 2026 BLTSEC"
    menuMore = "Show more"
    readMore = "Read more"
    readOtherPosts = "Read other posts"

    [languages.en.params.logo]
      logoText = "BLTSEC"
      logoHomeLink = "/"

    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "about"
        name = "About"
        url = "/about"
      [[languages.en.menu.main]]
        identifier = "posts"
        name = "Posts"
        url = "/posts"
      [[languages.en.menu.main]]
        identifier = "tags"
        name = "Tags"
        url = "/tags"
